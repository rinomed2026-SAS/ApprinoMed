<ion-tabs>
  <ion-tab-bar slot="bottom" class="tabs-bar">
    <ion-tab-button tab="home" [routerLink]="['/tabs/home']" class="tabs-button">
      <ion-icon mode="ios" name="home-outline"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="agenda" [routerLink]="['/tabs/agenda']" class="tabs-button">
      <ion-icon mode="ios" name="calendar-outline"></ion-icon>
      <ion-label>Agenda</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="speakers" [routerLink]="['/tabs/speakers']" class="tabs-button">
      <ion-icon mode="ios" name="people-outline"></ion-icon>
      <ion-label>Speakers</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="favorites" [routerLink]="['/tabs/favorites']" class="tabs-button">
      <ion-icon mode="ios" name="star-outline"></ion-icon>
      <ion-label>My Agenda</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="info" [routerLink]="['/tabs/info']" class="tabs-button">
      <ion-icon mode="ios" name="information-circle-outline"></ion-icon>
      <ion-label>Info</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
