[build]
  base = "apps/planb_webapp"
  command = "npm install --legacy-peer-deps --prefix ../mobile_ionic && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serve privacy.html as a static page (not SPA)
[[redirects]]
  from = "/privacy.html"
  to = "/privacy.html"
  status = 200

# SPA fallback — serves index.html for all routes (Angular/Ionic routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Context-specific: branch deploys & deploy previews
[context.production]
  command = "npm install --legacy-peer-deps --prefix ../mobile_ionic && npm run build"

[context.deploy-preview]
  command = "npm install --legacy-peer-deps --prefix ../mobile_ionic && npm run build"
